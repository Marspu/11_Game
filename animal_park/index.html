<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦁 动物乐园 - 11_Game</title>
    <link rel="stylesheet" href="../shared/theme.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="clouds-bg"></div>
    <a class="home-btn" href="../index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        返回首页
    </a>

    <div class="container">
        <header class="page-header">
            <h1 class="h-display"><span class="text-rainbow">🦁 动物乐园</span></h1>
            <p class="lead">认识可爱的动物朋友，看看它们都住在哪里！</p>
        </header>

        <!-- 模式切换 -->
        <div class="mode-tabs">
            <button class="tab-btn active" data-mode="memory">
                <span>🃏</span> 记忆翻牌
            </button>
            <button class="tab-btn" data-mode="habitat">
                <span>🌍</span> 找家家
            </button>
        </div>

        <!-- 记忆翻牌 -->
        <section class="game-section" id="memorySection">
            <div class="memory-hud">
                <div class="hud-pill"><span>翻动</span><strong id="moveCount">0</strong> 次</div>
                <div class="hud-pill"><span>已配对</span><strong id="matchCount">0</strong> / <strong id="totalPairs">8</strong></div>
                <button class="btn btn-secondary btn-sm" id="memReset">🔄 重玩</button>
            </div>
            <div class="memory-grid" id="memoryGrid"></div>
        </section>

        <!-- 栖息地匹配 -->
        <section class="game-section" id="habitatSection" hidden>
            <p class="section-intro">把每只小动物 🐾 拖到它家旁边！</p>
            <div class="habitat-hud">
                <div class="hud-pill"><span>已找到</span><strong id="habitatScore">0</strong> 个家</div>
                <button class="btn btn-secondary btn-sm" id="habReset">🔄 重玩</button>
            </div>
            <div class="habitat-stage">
                <div class="habitat-zones" id="habitatZones"></div>
                <div class="animal-pool" id="animalPool"></div>
            </div>
        </section>

        <!-- 完成弹窗 -->
        <div class="result-mask" id="resultMask" hidden>
            <div class="result-card">
                <div class="result-emoji">🎉</div>
                <h3 class="h-display" id="resultTitle">太棒啦！</h3>
                <p id="resultDesc">所有动物都找到家啦～</p>
                <div class="result-actions">
                    <button class="btn btn-primary" id="playAgainBtn">🔄 再来一次</button>
                    <button class="btn btn-secondary" id="switchModeBtn">🔀 试试其它玩法</button>
                </div>
            </div>
        </div>

        <div class="confetti-root" id="confettiRoot"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
