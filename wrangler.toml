# Cloudflare Pages 配置文件
# 文档: https://developers.cloudflare.com/pages/platform/build-configuration/

name = "11-game"
pages_build_output_dir = "."

# 构建配置（对于纯静态站点，不需要构建命令）
# build.command = ""
# build.publish = "."

# 路由配置
[[routes]]
pattern = "11.marspu.top"
zone_name = "marspu.top"

# 自定义头部
[headers]
# 安全头部
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"

# 缓存配置
[headers."/**/*.html"]
cache-control = "public, max-age=3600"

[headers."/**/*.css"]
cache-control = "public, max-age=31536000, immutable"

[headers."/**/*.js"]
cache-control = "public, max-age=31536000, immutable"

[headers."/**/*.png"]
cache-control = "public, max-age=31536000, immutable"

[headers."/**/*.jpg"]
cache-control = "public, max-age=31536000, immutable"

[headers."/**/*.svg"]
cache-control = "public, max-age=31536000, immutable"