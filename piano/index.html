<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎹 指尖钢琴家 - 11_Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .home-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            color: #fff;
            text-decoration: none;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .home-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 返回首页按钮 -->
        <a href="../index.html" class="home-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            返回首页
        </a>
        <header>
            <h1>🎹 指尖钢琴家</h1>
            <p class="subtitle">按下键盘字母键开始弹奏</p>
        </header>

        <div class="main-content">
            <!-- 左侧控制面板 -->
            <div class="control-panel">
                <div class="panel-section">
                    <h3>🎵 经典曲目</h3>
                    <div class="song-list">
                        <button class="song-btn" data-song="twinkle">
                            <span class="song-icon">⭐</span>
                            <span>小星星</span>
                        </button>
                        <button class="song-btn" data-song="happy_birthday">
                            <span class="song-icon">🎂</span>
                            <span>生日快乐</span>
                        </button>
                        <button class="song-btn" data-song="ode_to_joy">
                            <span class="song-icon">🎼</span>
                            <span>欢乐颂</span>
                        </button>
                        <button class="song-btn" data-song="fur_elise">
                            <span class="song-icon">🎭</span>
                            <span>致爱丽丝</span>
                        </button>
                        <button class="song-btn" data-song="jingle_bells">
                            <span class="song-icon">🔔</span>
                            <span>铃儿响叮当</span>
                        </button>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>🎮 演奏模式</h3>
                    <div class="mode-buttons">
                        <button id="freePlay" class="mode-btn active">自由弹奏</button>
                        <button id="followMode" class="mode-btn">跟随演奏</button>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>🎚️ 音量</h3>
                    <div class="volume-control">
                        <span class="volume-icon">🔈</span>
                        <input type="range" id="volumeSlider" min="0" max="100" value="70">
                        <span class="volume-icon">🔊</span>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>⌨️ 键盘映射</h3>
                    <div class="keyboard-hint">
                        <p>白键: A S D F G H J K L</p>
                        <p>黑键: W E T Y U O P</p>
                        <p>低音: Z X C V B N M</p>
                    </div>
                </div>
            </div>

            <!-- 五线谱显示区域 -->
            <div class="staff-container">
                <div class="staff-header">
                    <h3>🎼 五线谱</h3>
                    <div class="song-info" id="songInfo">
                        <span id="currentSong">自由弹奏模式</span>
                        <span id="progressInfo">进度: 0%</span>
                    </div>
                </div>
                <canvas id="staffCanvas"></canvas>
                <div class="staff-controls">
                    <button id="playBtn" class="control-btn">▶ 播放</button>
                    <button id="pauseBtn" class="control-btn">⏸ 暂停</button>
                    <button id="stopBtn" class="control-btn">⏹ 停止</button>
                    <button id="resetBtn" class="control-btn">🔄 重置</button>
                </div>
            </div>

            <!-- 钢琴键盘 -->
            <div class="piano-container">
                <div class="piano" id="piano">
                    <!-- 钢琴键将由JavaScript生成 -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
